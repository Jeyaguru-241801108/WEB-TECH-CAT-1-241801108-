<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance System</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #4A90E2;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        /* Status Styling */
        .status-options {
            display: flex;
            gap: 10px;
        }

        label {
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Custom Radio Colors */
        input[type="radio"] {
            accent-color: #4A90E2;
        }

        /* Submit Button (Visual Only) */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Class Attendance - AIDS G2</h2>
    <p><strong>Date:</strong> 08 March 2026</p>

    <table>
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Student Name</th>
                <th>Attendance Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>01</td>
                <td>Guru</td>
                <td class="status-options">
                    <label><input type="radio" name="s1" checked> Present</label>
                    <label><input type="radio" name="s1"> Absent</label>
                </td>
            </tr>
            <tr>
                <td>02</td>
                <td>Jaanga Donie</td>
                <td class="status-options">
                    <label><input type="radio" name="s2" checked> Present</label>
                    <label><input type="radio" name="s2"> Absent</label>
                </td>
            </tr>
            <tr>
                <td>03</td>
                <td>Dani Daniel</td>
                <td class="status-options">
                    <label><input type="radio" name="s3" checked> Present</label>
                    <label><input type="radio" name="s3"> Absent</label>
                </td>
            </tr>
            <tr>
                <td>04</td>
                <td>Surul Mudi</td>
                <td class="status-options">
                    <label><input type="radio" name="s4" checked> Present</label>
                    <label><input type="radio" name="s4"> Absent</label>
                </td>
            </tr>
        </tbody>
    </table>

    <button class="btn-submit" onclick="alert('Attendance Recorded (Prototype Only)')">Save Attendance</button>
</div>

</body>
</html>
